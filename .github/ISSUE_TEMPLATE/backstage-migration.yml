name: Backstage Migration Task
description: Track migration and cleanup work for Backstage catalog entities and supporting docs.
title: "Backstage migration: "
labels:
  - backstage
  - migration
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - docs
        - catalog
        - templates
        - scorecards
        - validation
        - agents
        - cleanup
    validations:
      required: true
  - type: input
    id: source_reference
    attributes:
      label: Source reference, if applicable
      placeholder: examples/services/customer-portal/catalog-info.yaml
    validations:
      required: false
  - type: input
    id: target_backstage_file
    attributes:
      label: Target Backstage file
      placeholder: backstage/catalog/components.yaml
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria and validation evidence
    validations:
      required: true
