version: 2
updates:
  # Keep root JavaScript manifests current if dependencies are added.
  # The current package-lock.json has no packages, so this is initially a no-op.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # GitHub requires Dependabot configuration under .github/ even though this repo
  # keeps workflow templates in github/workflows/ rather than active .github/workflows/.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
