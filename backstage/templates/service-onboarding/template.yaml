apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: service-onboarding
  title: Service Onboarding Checklist
  description: |
    Create an advisory checklist for completing Backstage catalog, TechDocs, and IKS metadata.

    NOTE: This template is advisory-only in the MVP. Use the GitHub Issue Forms directly
    or create a matching issue form for automation (tracked separately).
  tags:
    - iks
    - github
    - advisory
spec:
  owner: group:default/platform-team
  type: service
  parameters:
    - title: Request details
      required:
        - componentRef
        - reason
      properties:
        componentRef:
          title: Backstage component reference
          type: string
          description: "Example: component:default/customer-portal"
        reason:
          title: Reason or missing metadata
          type: string
        details:
          title: Additional details
          type: string
          description: Context, scorecard result, or requested follow-up.
  steps:
    - id: prepare-issue
      name: Prepare GitHub issue
      action: debug:log
      input:
        message: >-
          Prepare a GitHub issue for ${{ parameters.componentRef }}: ${{ parameters.reason }}.
          This MVP template is advisory and does not mutate production systems.
  output:
    text:
      - title: Follow-up
        content: Use the matching GitHub Issue Form to create the tracked task.
