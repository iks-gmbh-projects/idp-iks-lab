apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: iks-review-request
  title: IKS Review Request
  description: Create a manual IKS review request for a Backstage component.
  tags:
    - iks
    - github
    - advisory
spec:
  owner: group:default/platform-team
  type: service
  parameters:
    - title: Request details
      required:
        - componentRef
        - reason
      properties:
        componentRef:
          title: Backstage component reference
          type: string
          description: "Example: component:default/customer-portal"
        reason:
          title: Reason or missing metadata
          type: string
        details:
          title: Additional details
          type: string
          description: Context, scorecard result, or requested follow-up.
  steps:
    - id: prepare-issue
      name: Prepare GitHub issue
      action: debug:log
      input:
        message: >-
          Prepare a GitHub issue for ${{ parameters.componentRef }}: ${{ parameters.reason }}.
          This MVP template is advisory and does not mutate production systems.
  output:
    text:
      - title: Follow-up
        content: Use the matching GitHub Issue Form to create the tracked task.
